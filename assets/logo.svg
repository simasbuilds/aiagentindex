<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">AI Agent Building 101</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#123d2c"/>
      <stop offset="1" stop-color="#07110f"/>
    </linearGradient>
    <linearGradient id="mark" x1="12" y1="52" x2="52" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78f6c7"/>
      <stop offset="1" stop-color="#c8ff3d"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="16" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="15" fill="none" stroke="rgba(120,246,199,.22)"/>

  <g fill="none" stroke="url(#mark)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M32 14 L16 49"/>
    <path d="M32 14 L48 49"/>
    <path d="M22.6 37 H41.4"/>
  </g>

  <circle cx="32" cy="14" r="5" fill="#c8ff3d" filter="url(#glow)"/>
  <circle cx="16" cy="49" r="3.4" fill="#78f6c7"/>
  <circle cx="48" cy="49" r="3.4" fill="#78f6c7"/>
</svg>
